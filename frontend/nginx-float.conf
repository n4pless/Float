# Float Exchange — nginx config
# Serves the production frontend build (dist/) as static files,
# proxies /api/* to the faucet server, and /dlob/* to the DLOB server.
#
# Install:
#   sudo cp nginx-float.conf /etc/nginx/sites-available/float
#   sudo ln -sf /etc/nginx/sites-available/float /etc/nginx/sites-enabled/float
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 5174;
    listen [::]:5174;
    server_name _;

    # ── Static frontend (production build) ──
    root /home/gorcore/Drift-Clone/frontend/dist;
    index index.html;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Faucet API (Express server on :3001) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ── DLOB API (DLOB server on :6969) ──
    location /dlob/ {
        proxy_pass http://127.0.0.1:6969/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── SPA fallback: all other routes → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
